spring:
  application:
    name: swifttick
  
  # Java 21 Virtual Threads
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/swifttick?useSSL=false&serverTimezone=UTC}
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASS:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Valkey (Aiven) / Redis Configuration
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      username: ${VALKEY_USER:default}
      password: ${VALKEY_PASSWORD:}
      ssl:
        enabled: ${VALKEY_SSL_ENABLED:false}

  # Kafka (Aiven) Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USER}" password="${KAFKA_PASSWORD}";'
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: swifttick-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.swifttick.*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.swifttick: DEBUG
    org.springframework.modulith: INFO
